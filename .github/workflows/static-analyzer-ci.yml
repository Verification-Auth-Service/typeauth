name: static-analyzer-ci

on:
  push:
    branches:
      - release/**
    paths:
      - "apps/static-analyzer/**"

  pull_request:
    branches:
      - release/**
    paths:
      - "apps/static-analyzer/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: pnpm
          cache-dependency-path: apps/static-analyzer/pnpm-lock.yaml

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/static-analyzer

      - name: Run tests
        run: pnpm test
        working-directory: apps/static-analyzer
